{% extends 'layout/base.html' %}
{% block content %}
    <h1>图片工具网-AI聊天首页</h1>
    <form action="{% url 'chatbot:index' %}" method="post">
        {% csrf_token %}
        {#聊天输入框#}
        <input type="text" id="message" name="message"/>
        {#确认按钮#}
        <button type="submit" id="send">发送</button>
    </form>
    {#AI的答复#}
    <h2>AI的答复</h2>
    <div id="answer">
        <p id="answer-text">{{ answer }}</p>
    </div>
{% endblock %}
