{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片工具网</title>
    <link href="{% static 'bootstrap5.3.0/css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body>
{# 顶部导航 - 科技蓝风格 #}
<nav class="navbar navbar-expand-lg navbar-tech-blue">
    <div class="container-fluid">
        {# Logo #}
        <a class="navbar-brand" href="{% url 'index:index' %}">
            <span class="brand-icon">🖼️</span>
            <span>图片工具网</span>
        </a>
        
        {# 移动端汉堡菜单按钮 #}
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        {# 导航内容 #}
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.namespace == 'index' %}active{% endif %}"
                       href="{% url 'index:index' %}">首页</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.namespace == 'chatbot' %}active{% endif %}"
                       href="{% url 'chatbot:index' %}">AI聊天</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.namespace == 'image_tool' %}active{% endif %}"
                       href="{% url 'image_tool:index' %}">图片工具</a>
                </li>
            </ul>
            
            {# 搜索框 #}
            <form class="search-form" role="search">
                <input class="search-input" type="search" placeholder="请输入..." aria-label="Search">
                <button class="search-btn" type="submit">搜索</button>
            </form>
        </div>
    </div>
</nav>
{# 顶部导航结束 #}

{% block content %}

{% endblock %}

<script src="{% static 'bootstrap5.3.0/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
