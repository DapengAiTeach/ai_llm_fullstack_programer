<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>图片工具网</title>
</head>
<body>
{#顶部导航开始#}
<header>
    <nav>
        <ul>
            <li><a href="{% url 'index:index' %}">首页</a></li>
            <li><a href="{% url 'chatbot:index' %}">AI聊天</a></li>
            <li><a href="{% url 'image_tool:index' %}">图片工具</a></li>
        </ul>
    </nav>
</header>
{#顶部导航结束#}
<h1>图片工具网-图片工具首页</h1>
<!-- 显示预览 -->
<h3>预览：</h3>
{% if image_data %}
    <img src="{{ image_data }}" style="max-width: 500px; max-height: 500px;">
{% endif %}
<h3>请选择一张图片：</h3>
<!-- 上传表单 -->
<form action="{% url 'image_tool:index' %}" method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <input type="file" name="image" accept="image/*" required>
    <button type="submit">上传并预览</button>
</form>
</body>
</html>
